name: 'Deploy with Tailscale Access'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      audience:
        description: 'Tailscale OIDC audience (api.tailscale.com/YOUR_TAILNET_ID)'
        required: true
      client_id:
        description: 'Tailscale client ID (tailnet-id/client-id)'
        required: true
      tailnet:
        description: 'Tailnet name'
        required: false
      tags:
        description: 'Comma-separated tags for devices'
        required: false
        default: 'ci'

jobs:
  # Test the raw OIDC flow first (like the example you provided)
  test-oidc-flow:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AUDIENCE: ${{ inputs.audience || 'api.tailscale.com/kwfotJSwpf11CNTRL' }}
      CLIENT_ID: ${{ inputs.client_id || 'TdWjeTt8mN11CNTRL/kwfotJSwpf11CNTRL' }}
      TAILNET: ${{ inputs.tailnet || '_lbr_sandbox' }}
      TAGS: ${{ inputs.tags || 'ci' }}
    steps:
      - name: Get OIDC token from GitHub Actions
        run: |
          echo "🔑 Getting JWT token..."
          echo "Audience: $AUDIENCE"
          echo "Client ID: $CLIENT_ID"

          JWT=$(curl -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=$AUDIENCE" | jq -r '.value')

          echo "JWT length: ${#JWT}"
          echo "JWT first 50 chars: ${JWT:0:50}..."
          echo "JWT=$JWT" >> $GITHUB_ENV
          
      - name: Debug JWT Claims
        run: |
          echo "Decoding JWT to check claims..."
          JWT_PAYLOAD=$(echo "$JWT" | cut -d. -f2)
          JWT_PAYLOAD_PADDED=$(printf "$JWT_PAYLOAD"; printf "%*s" $((4 - ${#JWT_PAYLOAD} % 4)) | tr ' ' '=')
          echo "$JWT_PAYLOAD_PADDED" | base64 -d | jq .

      - name: Perform OIDC token exchange
        run: |
          echo "🔄 Performing token exchange..."
          
          # Show what we're sending
          echo "Client ID: $CLIENT_ID"
          echo "JWT length: ${#JWT}"
          
          # Perform the OIDC token exchange with Tailscale
          RESPONSE=$(curl -X POST https://api.tailscale.com/api/v2/oauth/token-exchange \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$CLIENT_ID" \
            -d "jwt=$JWT" \
            -w "HTTP_CODE:%{http_code}")
          
          # Extract HTTP code and response body
          HTTP_CODE=$(echo "$RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Token exchange failed!"
            exit 1
          fi
          
          # Extract access token
          ACCESS_TOKEN=$(echo $RESPONSE_BODY | jq -r '.access_token')
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV
          echo "✅ Access token obtained: ${ACCESS_TOKEN:0:10}..."

      - name: Test API request
        run: |
          echo "🌐 Testing API request..."
          curl -v https://api.tailscale.com/api/v2/tailnet/$TAILNET/devices \
            --header "Authorization: Bearer ${ACCESS_TOKEN}"