name: 'Deploy with Tailscale Access'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      audience:
        description: 'Tailscale OIDC audience'
        required: true
      client-id:
        description: 'Tailscale client ID '
        required: true
      tailnet:
        description: 'Tailnet name'
        required: false
      tags:
        description: 'Comma-separated tags for devices'
        required: false
        default: 'ci'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Required for OIDC token generation
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install
        run: |
          npm ci
          npm run build

      # Use the undocumented OIDC API - no secrets needed!
      - name: Configure Tailscale Credentials (OIDC)
        uses: ./
        with:
          audience: 'api.tailscale.com/kM66yc9sF721CNTRL'
          client-id: 'TdWjeTt8mN11CNTRL/kM66yc9sF721CNTRL' 
          tailnet: '_lbr_sandbox'
          tags: 'ci'

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ steps.tailscale-auth.outputs.ts-auth-key }}
          tags: 'ci'

      - name: Check Tailscale Connection
        run: |
          echo "Tailscale status:"
          tailscale status
          
          echo "Tailscale IP:"
          tailscale ip -4

      - name: Use Tailscale API
        env:
          TS_ACCESS_TOKEN: ${{ env.TS_ACCESS_TOKEN }}
        run: |
          echo "Listing devices in tailnet..."
          curl -H "Authorization: Bearer $TS_ACCESS_TOKEN" \
               https://api.tailscale.com/api/v2/tailnet/-/devices
