name: 'Deploy with Tailscale Access'

env:
  AUDIENCE: ${{ inputs.audience || 'api.tailscale.com/kk2ZtKKNGK11CNTRL' }}
  CLIENT_ID: ${{ inputs.client_id || 'TdWjeTt8mN11CNTRL/kk2ZtKKNGK11CNTRL' }}
  TAILNET: ${{ inputs.tailnet || '_lbr_sandbox' }}
  TAGS: ${{ inputs.tags || 'tag:ci' }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      audience:
        description: 'Tailscale OIDC audience (api.tailscale.com/YOUR_TAILNET_ID)'
        required: true
      client_id:
        description: 'Tailscale client ID (tailnet-id/client-id)'
        required: true
      tailnet:
        description: 'Tailnet name'
        required: false
      tags:
        description: 'Comma-separated tags for devices'
        required: false
        default: 'ci'

jobs:
  test-custom-action:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build custom action
        run: |
          echo "🔨 Building custom action..."
          npm install
          npm run build

      - name: Configure Tailscale Credentials (Custom Action)
        id: tailscale-auth
        uses: ./
        with:
          audience: ${{ inputs.audience || env.AUDIENCE }}
          client-id: ${{ inputs.client_id || env.CLIENT_ID }}
          tailnet: ${{ inputs.tailnet || env.TAILNET }}
          tags: ${{ inputs.tags || 'tag:ci' }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ steps.tailscale-auth.outputs.ts-oauth-client-id }}
          oauth-secret: ${{ steps.tailscale-auth.outputs.ts-oauth-client-secret }}
          tags: ${{ inputs.tags || 'tag:ci' }}

      - name: Check Tailscale Connection
        run: |
          echo "Tailscale status:"
          tailscale status
          
          echo "Tailscale IP:"
          tailscale ip -4

      - name: Use Tailscale API
        run: |
          echo "Listing devices in tailnet..."
          curl -H "Authorization: Bearer ${{ steps.tailscale-auth.outputs.ts-access-token }}" \
               https://api.tailscale.com/api/v2/tailnet/-/devices